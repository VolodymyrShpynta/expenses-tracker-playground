# =============================================================================
# Rate Limiting Zones
# =============================================================================
#
# Nginx rate limiting uses two concepts:
#   1. A "zone" — shared memory that tracks request counts
#   2. A "key"  — what to count by (per-IP, global, etc.)
#
# Syntax: limit_req_zone <key> zone=<name>:<size> rate=<limit>;
#   - $binary_remote_addr : client's IP address (binary form saves memory)
#   - $server_name        : same for all requests → creates a single global counter
#   - zone=<name>:<size>  : named shared memory zone; 10m ≈ 160,000 IP addresses
#   - rate=<N>r/s         : max sustained request rate (requests per second)
#
# --- Per-IP zones (each client gets its own bucket) ---
limit_req_zone $binary_remote_addr zone=general_per_ip:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=auth_per_ip:10m rate=3r/s;
#
# --- Global zones (single shared bucket for ALL clients) ---
# These protect the backend from total overload regardless of how many
# clients are making requests. Acts as a safety net even if individual
# clients are within their per-IP limits.
limit_req_zone $server_name zone=api_global:1m rate=300r/s;
limit_req_zone $server_name zone=sync_global:1m rate=10r/m;

# =============================================================================
# Server Block — the main virtual host
# =============================================================================
# A "server" block defines how Nginx handles requests for a particular
# host/port combination. This is the only server in our config.
server {
    # Listen on port 80 (HTTP). In production, TLS is terminated by Azure's
    # Envoy proxy before traffic reaches this container, so port 80 is fine.
    listen 80;
    server_name localhost;

    # Where the built React SPA files live inside the Docker container.
    # The Dockerfile copies the Vite build output here.
    root /usr/share/nginx/html;
    index index.html;

    # =========================================================================
    # Security Hardening
    # =========================================================================

    # Hide the "Server: nginx/1.x.x" header from responses.
    # Prevents attackers from fingerprinting the exact Nginx version.
    server_tokens off;

    # Max allowed size of a client request body (e.g., JSON payload).
    # Requests larger than 1 MB are rejected with 413 (Payload Too Large).
    client_max_body_size 1m;

    # How long to wait for the client to send the request body / headers.
    # Protects against "slow POST" / "Slowloris" attacks where a client
    # intentionally sends data very slowly to hold connections open.
    client_body_timeout 10s;
    client_header_timeout 10s;

    # =========================================================================
    # Reverse Proxy: Sync Endpoint  (/api/expenses/sync)
    # =========================================================================
    # Sync is expensive (reads/writes events + file I/O), so it gets a
    # dedicated location with a stricter global limit.
    # Must appear BEFORE the general /api/ location — Nginx matches the
    # longest prefix first among "location" blocks (not first-match order).
    location /api/expenses/sync {
        # Per-IP: max 5 req/s per client (same as other API endpoints)
        limit_req zone=api_per_ip burst=5 nodelay;
        # Global: max 10 req/min across ALL clients (sync is heavy)
        limit_req zone=sync_global burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://expenses-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================================================
    # Reverse Proxy: Backend API  (/api/*)
    # =========================================================================
    # Any request starting with /api/ is forwarded to the Spring Boot backend.
    # The backend container is named "expenses-api" in Docker Compose / Azure.
    location /api/ {
        # Per-IP: max 5 req/s per client
        #   burst=10 : allow up to 10 requests above the rate before rejecting
        #   nodelay  : don't queue burst requests — serve them immediately,
        #              but count them against the burst budget
        limit_req zone=api_per_ip burst=10 nodelay;
        # Global: max 30 req/s across ALL clients (backend safety net)
        limit_req zone=api_global burst=15 nodelay;

        # Return 429 (Too Many Requests) instead of Nginx's default 503
        # when rate limit is exceeded.
        limit_req_status 429;

        # Forward the request to the backend. Nginx replaces itself as the
        # client — the backend sees a request from Nginx, not from the browser.
        proxy_pass http://expenses-api:8080;

        # Pass the original request context to the backend:
        #   Host            : original hostname the browser used
        #   X-Real-IP       : actual client IP (browser)
        #   X-Forwarded-For : chain of proxies the request passed through
        #   X-Forwarded-Proto: original protocol (http or https)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================================================
    # Reverse Proxy: Keycloak  (/auth/*)
    # =========================================================================
    # Authentication requests are proxied to Keycloak. The /auth/ prefix is
    # preserved because Keycloak runs with context path /auth
    # (KC_HTTP_RELATIVE_PATH=/auth).
    location /auth/ {
        limit_req zone=auth_per_ip burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://keycloak:8180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================================================
    # Reverse Proxy: Spring Boot Actuator  (/actuator/*)
    # =========================================================================
    # Health checks and metrics. No rate limiting — these are typically called
    # by Azure's health probe, not end users.
    location /actuator/ {
        proxy_pass http://expenses-api:8080;
        proxy_set_header Host $host;
    }

    # =========================================================================
    # Static Files: React SPA  (everything else)
    # =========================================================================
    # Serves the built React application. This is the "catch-all" location.
    location / {
        limit_req zone=general_per_ip burst=20 nodelay;
        limit_req_status 429;

        # try_files attempts to serve files in order:
        #   1. $uri         — exact file match (e.g., /favicon.ico)
        #   2. $uri/        — directory match
        #   3. /index.html  — fallback for client-side routing (React Router)
        #
        # This fallback is essential for SPAs: when a user navigates to
        # /transactions or /categories, there is no real file at that path —
        # Nginx serves index.html and React Router handles the route.
        try_files $uri $uri/ /index.html;
    }

    # =========================================================================
    # Cache: Static Assets  (/assets/*)
    # =========================================================================
    # Vite puts JS/CSS bundles in /assets/ with content hashes in filenames
    # (e.g., index-a1b2c3.js). Because the hash changes when content changes,
    # it's safe to cache aggressively.
    location /assets/ {
        # Tell browsers to cache these files for 1 year.
        expires 1y;

        # "public"    — CDNs and proxies may cache this
        # "immutable" — file will never change at this URL (hash-based naming)
        add_header Cache-Control "public, immutable";
    }
}
