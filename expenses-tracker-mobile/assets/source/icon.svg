<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- ===== Tile gradients (from current icon.svg) ===== -->
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#7ec8ff"/>
      <stop offset="0.35" stop-color="#6870fa"/>
      <stop offset="0.75" stop-color="#4f57d6"/>
      <stop offset="1"    stop-color="#1f267d"/>
    </linearGradient>
    <radialGradient id="tileGlow" cx="0.85" cy="0.1" r="0.7">
      <stop offset="0"    stop-color="#6be3ff" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#7c84ff" stop-opacity="0.18"/>
      <stop offset="1"    stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tileGlow2" cx="0.1" cy="0.95" r="0.7">
      <stop offset="0"   stop-color="#a07cff" stop-opacity="0.45"/>
      <stop offset="0.6" stop-color="#5e67e6" stop-opacity="0.15"/>
      <stop offset="1"   stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sheen" cx="0.5" cy="0" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tileShade" cx="0.5" cy="1" r="0.95">
      <stop offset="0.55" stop-color="#0f1450" stop-opacity="0"/>
      <stop offset="1"    stop-color="#0f1450" stop-opacity="0.4"/>
    </radialGradient>

    <!-- ===== Tile clip — confines everything to the rounded-rect shape so
         the halo / donut don't paint past the corners. ===== -->
    <clipPath id="tileClip">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>

    <!-- ===== Soft drop shadow under the donut ===== -->
    <filter id="donutShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ===== Wedge gradients =====
         Slice 1 (12 → 2)   : blue gradient
         Slice 4 (8:15 → 12): blue-leaning purple
         Slices 2, 3 (bottom half): off-white -->
    <linearGradient id="wedge1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#8ec0ff"/>
      <stop offset="0.55" stop-color="#5e94e6"/>
      <stop offset="1"   stop-color="#3568c2"/>
    </linearGradient>
    <linearGradient id="wedge4" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#a9bcf5"/>
      <stop offset="0.55" stop-color="#8090d6"/>
      <stop offset="1"   stop-color="#5965b0"/>
    </linearGradient>
    <linearGradient id="wedgeWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#f3f5fb"/>
      <stop offset="0.55" stop-color="#d8def0"/>
      <stop offset="1"    stop-color="#bac3df"/>
    </linearGradient>

    <!-- ===== Per-slice highlight pools — bright spot near the inner rim of each
         coloured slice, to suggest curvature. =====-->
    <radialGradient id="wedge1Hi" cx="600" cy="360" r="220" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1"   stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wedge4Hi" cx="410" cy="380" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0.50"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1"   stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- ===== Donut outer halo — soft cyan glow around the donut rim.
         Stops spread wide and capped at low opacity to avoid visible banding. ===== -->
    <radialGradient id="donutHalo" cx="512" cy="512" r="560" gradientUnits="userSpaceOnUse">
      <stop offset="0.4"  stop-color="#6be3ff" stop-opacity="0"/>
      <stop offset="0.72" stop-color="#6be3ff" stop-opacity="0.12"/>
      <stop offset="1"    stop-color="#6be3ff" stop-opacity="0"/>
    </radialGradient>

    <!-- ===== Soft sheen overlay across the donut top half ===== -->
    <radialGradient id="donutSheen" cx="512" cy="200" r="420" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1"    stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- ===== Center badge (from p6-vivid-ocean) ===== -->
    <radialGradient id="badge" cx="0.4" cy="0.35" r="0.9">
      <stop offset="0"    stop-color="#3a6cee"/>
      <stop offset="0.55" stop-color="#0a1e80"/>
      <stop offset="1"    stop-color="#000638"/>
    </radialGradient>

    <!-- ===== Inner-glow ring around the badge ===== -->
    <radialGradient id="badgeGlow" cx="512" cy="512" r="195" gradientUnits="userSpaceOnUse">
      <stop offset="0.65" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.85" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1"    stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- ===== Badge inner shadow (bottom-right) for a domed feel ===== -->
    <radialGradient id="badgeShade" cx="600" cy="600" r="220" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#000638" stop-opacity="0.45"/>
      <stop offset="0.7" stop-color="#000638" stop-opacity="0.05"/>
      <stop offset="1"   stop-color="#000638" stop-opacity="0"/>
    </radialGradient>

    <!-- ===== S gradient (subtle: white → very pale blue) ===== -->
    <linearGradient id="sGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#ffffff"/>
      <stop offset="1"   stop-color="#dbe7ff"/>
    </linearGradient>

    <!-- ===== Divider gradient — light blue, brightens as it goes outward.
         Uses userSpaceOnUse so a single radial centered on the donut
         applies consistently to all four dividers. ===== -->
    <radialGradient id="dividerGrad" cx="512" cy="512" r="400" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#2a4cb3"/>
      <stop offset="0.6" stop-color="#5d86d8"/>
      <stop offset="1"   stop-color="#8fb6e8"/>
    </radialGradient>
  </defs>

  <!-- ===== App tile (multi-layered gradient) ===== -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#tile)"/>
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#tileGlow)"/>
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#tileGlow2)"/>
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#sheen)"/>
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#tileShade)"/>

  <!-- ===== Everything else is clipped to the tile so nothing paints past the rounded corners. ===== -->
  <g clip-path="url(#tileClip)">

  <!-- ===== Donut outer halo (sits BEHIND the donut, no shadow filter) ===== -->
  <circle cx="512" cy="512" r="560" fill="url(#donutHalo)"/>

  <!-- ===== Donut, R=400 outer, r=170 inner.
       4 slices at clock positions 12, 2, 4:30, 8:15
       (angles 0°, 60°, 135°, 247.5°). ===== -->
  <g filter="url(#donutShadow)">
    <!-- Slice 1: 0° → 60° (12 → 2 o'clock)  — blue gradient -->
    <path d="M 512 112
             A 400 400 0 0 1 858.41 312
             L 659.22 427
             A 170 170 0 0 0 512 342 Z"
          fill="url(#wedge1)"/>
    <!-- Slice 2: 60° → 135° (2 → 4:30)  — white -->
    <path d="M 858.41 312
             A 400 400 0 0 1 794.84 794.84
             L 632.21 632.21
             A 170 170 0 0 0 659.22 427 Z"
          fill="url(#wedgeWhite)"/>
    <!-- Slice 3: 135° → 247.5° (4:30 → 8:15)  — white -->
    <path d="M 794.84 794.84
             A 400 400 0 0 1 142.45 665.07
             L 354.94 577.06
             A 170 170 0 0 0 632.21 632.21 Z"
          fill="url(#wedgeWhite)"/>
    <!-- Slice 4: 247.5° → 360° (8:15 → 12)  — light blue → purple -->
    <path d="M 142.45 665.07
             A 400 400 0 0 1 512 112
             L 512 342
             A 170 170 0 0 0 354.94 577.06 Z"
          fill="url(#wedge4)"/>

    <!-- Per-slice highlight pools (drawn AFTER fills, BEFORE dividers).
         Each is clipped to its own slice path via the same arc geometry. -->
    <path d="M 512 112
             A 400 400 0 0 1 858.41 312
             L 659.22 427
             A 170 170 0 0 0 512 342 Z"
          fill="url(#wedge1Hi)"/>
    <path d="M 142.45 665.07
             A 400 400 0 0 1 512 112
             L 512 342
             A 170 170 0 0 0 354.94 577.06 Z"
          fill="url(#wedge4Hi)"/>

    <!-- Dividers — light blue gradient (inner darker → outer lighter).
         Clock positions 12, 2, 4:30, 8:15  →  0°, 60°, 135°, 247.5°.
         Endpoints: inner-rim (r=170) → outer-rim (R=400). -->
    <g stroke="url(#dividerGrad)" stroke-width="18" stroke-linecap="butt">
      <line x1="512"    y1="342"    x2="512"    y2="112"/>
      <line x1="659.22" y1="427"    x2="858.41" y2="312"/>
      <line x1="632.21" y1="632.21" x2="794.84" y2="794.84"/>
      <line x1="354.94" y1="577.06" x2="142.45" y2="665.07"/>
    </g>

    <!-- Sheen overlay on the donut top half (clipped to the ring shape). -->
    <path d="M 512 112
             A 400 400 0 1 1 511 112 Z
             M 512 342
             A 170 170 0 1 0 513 342 Z"
          fill="url(#donutSheen)" fill-rule="evenodd"/>
  </g>

  <!-- ===== Center badge (sits ON TOP of the dividers, hides their inner tips) ===== -->
  <circle cx="512" cy="512" r="195" fill="url(#badge)"/>
  <!-- Inner-glow ring on the badge rim -->
  <circle cx="512" cy="512" r="195" fill="url(#badgeGlow)"/>
  <!-- Inner shadow at bottom-right for a domed feel -->
  <circle cx="512" cy="512" r="195" fill="url(#badgeShade)"/>

  <!-- ===== White S — hand-drawn "classic thick", scaled down ~85% around badge center ===== -->
  <g transform="translate(512 510) scale(0.85) translate(-512 -510)">
    <path id="sPath" d="M 600 412
             C 600 348, 424 348, 424 438
             C 424 528, 600 488, 600 580
             C 600 672, 424 672, 424 608"
          fill="none"
          stroke="url(#sGrad)"
          stroke-width="84"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  </g>
</svg>
