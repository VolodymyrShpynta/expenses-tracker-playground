server:
  # Trust X-Forwarded-* headers from Nginx/Envoy so that remoteAddress,
  # scheme, and port reflect the real client, not the proxy.
  forward-headers-strategy: framework

spring:
  application:
    name: expenses-tracker-api
  r2dbc:
    url: ${EXPENSES_TRACKER_R2DBC_URL:r2dbc:postgresql://localhost:5432/expenses_db}
    username: ${EXPENSES_TRACKER_R2DBC_USERNAME:postgres}
    password: ${EXPENSES_TRACKER_R2DBC_PASSWORD:postgres}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m
      validation-query: SELECT 1
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    datasource:
      jdbc-url: ${EXPENSES_TRACKER_FLYWAY_JDBC_URL:jdbc:postgresql://localhost:5432/expenses_db}
      username: ${EXPENSES_TRACKER_FLYWAY_USERNAME:postgres}
      password: ${EXPENSES_TRACKER_FLYWAY_PASSWORD:postgres}
      driver-class-name: org.postgresql.Driver
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:3000/auth/realms/expenses-tracker}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/auth/realms/expenses-tracker/protocol/openid-connect/certs}

# CORS configuration. Comma-separated list of origins the browser is allowed
# to send cross-origin requests from. In Azure the frontend URL must be listed
# here, otherwise Spring's CORS filter returns 403 on POST/PUT/DELETE.
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:}

  # ---------------------------------------------------------------------------
  # GDPR subsystem
  # ---------------------------------------------------------------------------
  # Implementation guide and rationale: see /GDPR.md at the repo root.
  #
  # Defaults are conservative and disabled-where-impactful:
  #   * inactivity.enabled defaults to false — the warning email transport
  #     must be wired up before turning this on; otherwise accounts would be
  #     erased without notice.
  #   * keycloak.enabled  defaults to false — the post-erasure cascade then
  #     becomes a manual follow-up by the operator.
  gdpr:
    fresh-auth:
      max-age: ${GDPR_FRESH_AUTH_MAX_AGE:PT5M}
    restriction:
      lift-dwell: ${GDPR_RESTRICTION_LIFT_DWELL:P7D}
    inactivity:
      enabled: ${GDPR_INACTIVITY_ENABLED:false}
      warning-after: ${GDPR_INACTIVITY_WARNING_AFTER:P1095D}
      erasure-grace: ${GDPR_INACTIVITY_GRACE:P90D}
      cron: ${GDPR_INACTIVITY_CRON:0 0 3 * * *}
    activity:
      touch-debounce: ${GDPR_ACTIVITY_DEBOUNCE:PT15M}
      cache-max-entries: ${GDPR_ACTIVITY_CACHE_MAX:100000}
    revocation:
      cache-max-entries: ${GDPR_REVOCATION_CACHE_MAX:50000}
      expires-grace: ${GDPR_REVOCATION_EXPIRES_GRACE:PT15M}
      notify-enabled: ${GDPR_REVOCATION_NOTIFY_ENABLED:true}
      notify-channel: ${GDPR_REVOCATION_NOTIFY_CHANNEL:session_revoked}
      notify-reconnect-delay: ${GDPR_REVOCATION_NOTIFY_RECONNECT_DELAY:PT5S}
      prune-interval: ${GDPR_REVOCATION_PRUNE_INTERVAL:PT5M}
      prune-safety-margin: ${GDPR_REVOCATION_PRUNE_SAFETY_MARGIN:PT5M}
    keycloak:
      enabled: ${GDPR_KEYCLOAK_ADMIN_ENABLED:false}
      base-url: ${GDPR_KEYCLOAK_ADMIN_URL:}
      realm: ${GDPR_KEYCLOAK_ADMIN_REALM:}
      client-id: ${GDPR_KEYCLOAK_ADMIN_CLIENT_ID:}
      client-secret: ${GDPR_KEYCLOAK_ADMIN_CLIENT_SECRET:}
      token-path: ${GDPR_KEYCLOAK_TOKEN_PATH:/realms/{realm}/protocol/openid-connect/token}
      user-path: ${GDPR_KEYCLOAK_USER_PATH:/admin/realms/{realm}/users/{userId}}
      user-logout-path: ${GDPR_KEYCLOAK_USER_LOGOUT_PATH:/admin/realms/{realm}/users/{userId}/logout}
